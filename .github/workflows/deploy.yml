name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------
  # Run tests on every push and pull request
  # -------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm test

  # -------------------------------------------------------------------
  # Deploy to Gandi Simple Hosting — only on pushes to main
  #
  # Required GitHub secrets:
  #   GANDI_SSH_KEY    — contents of your private SSH key (the matching
  #                      public key must be added in the Gandi control
  #                      panel under Simple Hosting → SSH keys)
  #   GANDI_GIT_REMOTE — full git remote URL from Gandi, e.g.
  #                      git+ssh://<uuid>@git.sd6.gpaas.net/default.git
  # -------------------------------------------------------------------
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so git push doesn't fail

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build CSS
        run: npm run css:build

      # Include the freshly built CSS in what gets pushed to Gandi.
      # Gandi runs `npm install` + `npm start` but does not run build scripts.
      - name: Commit built assets
        run: |
          git config user.email "deploy@github-actions"
          git config user.name "GitHub Actions"
          git add -f public/style.min.css
          git diff --staged --quiet || git commit -m "ci: build assets [skip ci]"

      # Gandi Simple Hosting deploys from the 'master' branch. It authenticates
      # git over SSH with a personal access token used as the SSH *password*
      # (Gandi's default deploy-token method). We feed it non-interactively via
      # SSH_ASKPASS — robust to the server's prompt wording, unlike sshpass.
      # Secret GANDI_TOKEN = the token from the hosting's "Deploy your code" panel.
      - name: Push to Gandi
        env:
          GANDI_TOKEN: ${{ secrets.GANDI_TOKEN }}
          GANDI_REMOTE: ${{ secrets.GANDI_GIT_REMOTE }}
        run: |
          GANDI_HOST=$(echo "$GANDI_REMOTE" | sed 's|^[^/]*//[^@]*@||;s|/.*||')
          mkdir -p ~/.ssh
          ssh-keyscan -H "$GANDI_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          printf '#!/bin/sh\nprintf "%%s\\n" "$GANDI_TOKEN"\n' > "$RUNNER_TEMP/askpass.sh"
          chmod +x "$RUNNER_TEMP/askpass.sh"
          echo "DEBUG token byte length: ${#GANDI_TOKEN}"
          echo "DEBUG askpass output bytes: $(sh "$RUNNER_TEMP/askpass.sh" | wc -c)"
          echo "DEBUG remote host: $GANDI_HOST"
          git remote add gandi "$GANDI_REMOTE"
          SSH_ASKPASS="$RUNNER_TEMP/askpass.sh" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 \
          GIT_SSH_COMMAND="ssh -o PreferredAuthentications=keyboard-interactive,password -o PubkeyAuthentication=no -o StrictHostKeyChecking=yes -o NumberOfPasswordPrompts=1" \
            git push gandi HEAD:master --force
